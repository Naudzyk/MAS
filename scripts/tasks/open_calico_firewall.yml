- name: Check if UFW is active
  command: ufw status
  register: ufw_status
  changed_when: false
  failed_when: false

- name: Open Calico VXLAN UDP port in UFW
  shell: |
    set -e
    PORT="{{ calico_vxlan_port | default(4789) }}"
    SRC="{{ calico_firewall_source_cidr | default('') }}"
    if [ -n "$SRC" ]; then
      ufw allow from "$SRC" to any port "$PORT" proto udp comment 'Calico VXLAN'
    else
      ufw allow "$PORT"/udp comment 'Calico VXLAN'
    fi
  args:
    executable: /bin/bash
  when:
    - calico_open_firewall | default(true) | bool
    - ufw_status.stdout is defined
    - "'Status: active' in ufw_status.stdout"

- name: Check if firewalld is running
  command: systemctl is-active firewalld
  register: firewalld_active
  changed_when: false
  failed_when: false

- name: Open Calico VXLAN UDP port in firewalld
  shell: |
    set -e
    PORT="{{ calico_vxlan_port | default(4789) }}"
    firewall-cmd --permanent --add-port="${PORT}/udp"
    firewall-cmd --reload
  args:
    executable: /bin/bash
  when:
    - calico_open_firewall | default(true) | bool
    - firewalld_active.stdout | default('') == 'active'
