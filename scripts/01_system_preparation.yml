---
- name: Prepare system for Kubernetes
  hosts: all
  gather_facts: yes
  become: yes
  vars_files:
    - vars.yml

  vars:
    # Определяем семейство ОС: debian (apt) или redhat (dnf)
    # AstraLinux (Astra Linux) — на базе Debian
    # RedOS (Рэд ОС) — на базе RHEL
    _debian_like:
      - Debian
      - Ubuntu
      - "Astra Linux"
    _redhat_like:
      - RedHat
      - CentOS
      - Rocky
      - AlmaLinux
      - Fedora
      - RedOS

  tasks:
    - name: Resolve OS family (debian vs redhat)
      set_fact:
        resolved_os_family: "{{ 'redhat' if (ansible_os_family in _redhat_like or (ansible_distribution | default('')) in ['RedOS', 'Red OS']) else 'debian' }}"

    - name: Fail on unsupported OS
      fail:
        msg: "Unsupported OS: ansible_os_family={{ ansible_os_family }}, ansible_distribution={{ ansible_distribution | default('N/A') }}. Supported: Debian, Ubuntu, AstraLinux, RHEL, Rocky, AlmaLinux, RedOS."
      when: resolved_os_family not in ['debian', 'redhat']

    - name: Include OS-specific vars
      include_vars: "os/{{ resolved_os_family }}.yml"

    - name: Update package cache (Debian/Ubuntu/AstraLinux)
      apt:
        update_cache: yes
        cache_valid_time: 1800
      when: resolved_os_family == 'debian'

    - name: Update package cache (RHEL/Rocky/RedOS)
      dnf:
        update_cache: yes
      when: resolved_os_family == 'redhat'

    - name: Install base packages
      package:
        name: "{{ os_packages }}"
        state: present
      when: os_packages is defined

    - name: Ensure kernel modules for Kubernetes
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: "0644"

    - name: Load kernel modules
      shell: |
        modprobe overlay || true
        modprobe br_netfilter || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Configure sysctl for Kubernetes networking
      copy:
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        mode: "0644"

    - name: Apply sysctl params
      command: sysctl --system
      register: sysctl_result
      changed_when: false
      failed_when: false
