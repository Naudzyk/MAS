- name: Join worker nodes to Kubernetes cluster
  hosts: central_manager
  gather_facts: yes
  become: yes
  vars_files:
    - vars.yml

  vars:
    kubeconfig_path: /etc/kubernetes/admin.conf

  tasks:
    - name: Gather facts on workers before join
      setup:
      delegate_to: "{{ item }}"
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Stop kubelet on workers
      delegate_to: "{{ item }}"
      shell: systemctl stop kubelet || true
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Unmount kubelet mounts on workers
      delegate_to: "{{ item }}"
      shell: |
        for m in $(mount | awk '/\/var\/lib\/kubelet/ {print $3}' | sort -r); do umount -f "$m" || true; done
      args:
        executable: /bin/bash
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: kubeadm reset on workers
      delegate_to: "{{ item }}"
      command: /usr/bin/kubeadm reset -f
      ignore_errors: true
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Remove kube/kubelet PKI and configs on workers
      delegate_to: "{{ item }}"
      shell: |
        rm -rf /etc/kubernetes/pki \
               /etc/kubernetes/kubelet.conf \
               /etc/kubernetes/bootstrap-kubelet.conf \
               /var/lib/kubelet/pki \
               /var/lib/kubelet/config.yaml || true
      args:
        executable: /bin/bash
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Clean CNI state on workers
      delegate_to: "{{ item }}"
      shell: rm -rf /etc/cni/net.d/* /var/lib/cni/* || true
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Ensure CNI plugin directories on workers
      delegate_to: "{{ item }}"
      shell: mkdir -p /opt/cni/bin /etc/cni/net.d /var/lib/cni/networks /var/log/calico/cni
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Install kubernetes-cni on workers (required by calico install-cni)
      delegate_to: "{{ item }}"
      # package: auto-selects apt/dnf, so it works for Debian and RHEL/RedOS workers
      package:
        name: kubernetes-cni
        state: present
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Restart containerd and kubelet on workers
      delegate_to: "{{ item }}"
      shell: |
        systemctl restart containerd || true
        systemctl restart kubelet || true
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Deploy containerd configure script on workers
      template:
        src: templates/configure_containerd.sh.j2
        dest: /usr/local/sbin/mas-configure-containerd.sh
        mode: "0755"
        newline_sequence: "\n"
      delegate_to: "{{ item }}"
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Run containerd configure on workers
      shell: |
        sed -i 's/\r$//' /usr/local/sbin/mas-configure-containerd.sh
        /bin/bash /usr/local/sbin/mas-configure-containerd.sh
      args:
        executable: /bin/bash
      delegate_to: "{{ item }}"
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Pre-pull pause image on workers
      command: ctr -n k8s.io images pull {{ pause_image }}
      delegate_to: "{{ item }}"
      register: prepull_pause
      retries: 3
      delay: 30
      until: prepull_pause is succeeded
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Pre-pull Calico CNI image on workers
      command: ctr -n k8s.io images pull {{ calico_cni_image }}
      delegate_to: "{{ item }}"
      register: prepull_calico_cni
      retries: 3
      delay: 30
      until: prepull_calico_cni is succeeded
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Pre-pull Calico node image on workers
      command: ctr -n k8s.io images pull {{ calico_node_image }}
      delegate_to: "{{ item }}"
      register: prepull_calico_node
      retries: 3
      delay: 30
      until: prepull_calico_node is succeeded
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Pre-pull kube-proxy image on workers
      command: ctr -n k8s.io images pull {{ k8s_image_repository }}/kube-proxy:v{{ k8s_version }}
      delegate_to: "{{ item }}"
      register: prepull_kube_proxy
      retries: 3
      delay: 30
      until: prepull_kube_proxy is succeeded
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Load vxlan module on workers (required by Calico VXLAN)
      delegate_to: "{{ item }}"
      shell: modprobe vxlan || true
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Ensure kubelet node-ip on workers matches inventory (before join)
      delegate_to: "{{ item }}"
      copy:
        dest: >-
          {{ '/etc/sysconfig/kubelet'
             if (hostvars[item].ansible_os_family | default('')) in ['RedHat','Rocky','AlmaLinux','CentOS','Fedora']
             or (hostvars[item].ansible_distribution | default('')) in ['RedOS', 'Red OS']
             else '/etc/default/kubelet' }}
        content: |
          KUBELET_EXTRA_ARGS="--node-ip={{ hostvars[item].ansible_host | default(item) }}"
        mode: "0644"
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Restart kubelet on workers to apply node-ip before join
      delegate_to: "{{ item }}"
      systemd:
        name: kubelet
        state: restarted
        daemon_reload: yes
      loop: "{{ groups['execute_nodes'] | default([]) }}"

    - name: Get join command (control-plane)
      command: /usr/bin/kubeadm token create --print-join-command
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      register: join_cmd

    - name: Build full join command using system kubeadm
      set_fact:
        join_command_full: "{{ join_cmd.stdout | trim | regex_replace('^kubeadm','/usr/bin/kubeadm') }}"
      when: join_cmd is defined

    - name: Join workers to cluster (node-ip via kubelet KUBELET_EXTRA_ARGS, not kubeadm flag)
      when:
        - groups['execute_nodes'] is defined
        - (groups['execute_nodes'] | length) > 0
        - join_command_full is defined
      delegate_to: "{{ item }}"
      shell: "{{ join_command_full }}"
      args:
        executable: /bin/bash
      loop: "{{ groups['execute_nodes'] }}"

    - name: Point Calico at real API server before waiting for CNI on workers
      shell: |
        /usr/bin/kubectl -n kube-system create configmap kubernetes-services-endpoint \
          --from-literal=KUBERNETES_SERVICE_HOST="{{ central_manager_ip }}" \
          --from-literal=KUBERNETES_SERVICE_PORT="6443" \
          --dry-run=client -o yaml | /usr/bin/kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Re-apply Calico env after worker join (VXLAN + node IP autodetect)
      include_tasks: tasks/configure_calico_node_env.yml

    - name: Restart calico-node after worker join (pick up API endpoint override)
      command: /usr/bin/kubectl -n kube-system rollout restart ds/calico-node
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"

    - name: Wait for all nodes Ready
      shell: |
        set -e
        not_ready=$(/usr/bin/kubectl get nodes --no-headers | awk '$2!="Ready"{print $1}' | paste -sd, -)
        if [ -n "$not_ready" ]; then
          echo "Not Ready: $not_ready"
          exit 1
        fi
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: nodes_ready
      retries: 60
      delay: 10
      until: nodes_ready.rc == 0

    - name: Wait for calico-node on all nodes after worker join
      command: /usr/bin/kubectl -n kube-system rollout status ds/calico-node --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: calico_after_join
      failed_when: false

    - name: Get calico-node status when rollout failed after join (diagnostic)
      command: /usr/bin/kubectl -n kube-system get pods -l k8s-app=calico-node -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: calico_pods_after
      changed_when: false
      when:
        - calico_after_join is defined
        - calico_after_join.rc != 0

    - name: Describe calico-node pods when rollout failed after join (diagnostic)
      command: /usr/bin/kubectl -n kube-system describe pods -l k8s-app=calico-node
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: calico_describe_after
      changed_when: false
      when:
        - calico_after_join is defined
        - calico_after_join.rc != 0

    - name: Fail if calico-node not ready after worker join
      fail:
        msg: |
          calico-node did not become ready after worker join (worker stays NotReady without CNI).
          Pods:
          {{ calico_pods_after.stdout | default('(none)') }}

          Describe:
          {{ calico_describe_after.stdout | default('(none)') }}

          Проверьте: доступ к quay.io/calico, firewall UDP {{ calico_vxlan_port | default(4789) }} (VXLAN) между узлами,
          совпадение node-ip в inventory и `kubectl get nodes -o wide`.
      when:
        - calico_after_join is defined
        - calico_after_join.rc != 0
