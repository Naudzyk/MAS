---
- name: Install and configure containerd
  hosts: all
  gather_facts: yes
  become: yes
  vars_files:
    - vars.yml

  vars:
    _debian_like: [Debian, Ubuntu, "Astra Linux"]
    _redhat_like: [RedHat, CentOS, Rocky, AlmaLinux, Fedora, RedOS]

  tasks:
    - name: Resolve OS family
      set_fact:
        resolved_os_family: "{{ 'redhat' if (ansible_os_family in _redhat_like or (ansible_distribution | default('')) in ['RedOS', 'Red OS']) else 'debian' }}"

    - name: Install containerd (Debian/Ubuntu/AstraLinux)
      apt:
        name: containerd
        state: present
        update_cache: yes
      when: resolved_os_family == 'debian'

    - name: Install containerd (RHEL/Rocky/RedOS)
      dnf:
        name: containerd
        state: present
      when: resolved_os_family == 'redhat'

    - name: Configure containerd (SystemdCgroup=true + pause {{ pause_version }})
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -ri 's#(SystemdCgroup = )false#\1true#g' /etc/containerd/config.toml
        sed -ri 's#sandbox_image = "registry\.(k8s\.io|aliyuncs\.com)/google_containers/pause:[0-9\.]+"#sandbox_image = "registry.aliyuncs.com/google_containers/pause:{{ pause_version }}"#g' /etc/containerd/config.toml || true
        systemctl daemon-reload
        systemctl enable --now containerd
      args:
        executable: /bin/bash
