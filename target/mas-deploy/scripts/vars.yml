ansible_python_interpreter: /usr/bin/python3

k8s_version: "1.35.5"
k8s_image_repository: registry.cn-hangzhou.aliyuncs.com/google_containers
k8s_dns_image_repository: ""
k8s_registry_mirror: ""
k8s_pkg_mirror: "yandex"
pause_version: "3.10"
pause_image: "{{ k8s_image_repository }}/pause:{{ pause_version }}"
calico_cni_image: "{{ calico_image_registry }}/cni:{{ calico_version }}"
calico_node_image: "{{ calico_image_registry }}/node:{{ calico_version }}"
condor_image: "ghcr.io/naudzyk/condor-ubuntu24.04:latest"
htcondor_busybox_image: "quay.io/quay/busybox:latest"
condor_logs_dir: "/var/log/condor"
condor_cluster_password: "{{ lookup('env', 'CONDOR_CLUSTER_PASSWORD') }}"
calico_image_registry: "quay.io/calico"
calico_version: "v3.32.0"
# UDP-порт VXLAN Calico (фиксированный — добавьте его в firewall между всеми нодами).
calico_vxlan_port: 4789
# true — плейбук сам откроет calico_vxlan_port/udp в ufw или firewalld.
calico_open_firewall: true
# Ограничить источник (опционально), например 192.168.56.0/24. Пусто — любой источник.
calico_firewall_source_cidr: ""
calico_pod_cidr: "10.244.0.0/16"
docker_io_mirror: "https://docker.m.daocloud.io"
quay_io_mirror: "https://quay.m.daocloud.io"
ghcr_io_mirror: "https://ghcr.m.daocloud.io"
victoriametrics_version: "v1.97.1"
victoriametrics_storage_path: "/var/lib/victoria-metrics"
victoriametrics_retention_period: "12"
