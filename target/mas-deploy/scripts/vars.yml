ansible_python_interpreter: /usr/bin/python3

k8s_version: "1.30.7"
k8s_pkg_mirror: "yandex" # apt/yum packages for kubeadm/kubelet/kubectl
pause_version: "3.9"
condor_image: "ghcr.io/naudzyk/htcondor2:latest"
htcondor_busybox_image: "quay.io/quay/busybox:latest"
condor_logs_dir: "/var/log/condor"
condor_cluster_password: "{{ lookup('env', 'CONDOR_CLUSTER_PASSWORD') }}"
calico_image_registry: "quay.io/calico"
calico_version: "v3.27.3"
# Нужно для 02_containerd.yml (зеркало docker.io)
docker_io_mirror: "https://docker.m.daocloud.io"
