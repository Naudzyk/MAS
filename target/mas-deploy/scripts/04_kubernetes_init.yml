- name: Install Kubernetes components
  hosts: all
  gather_facts: yes
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Reset any existing cluster (all nodes)
      command: /usr/bin/kubeadm reset -f
      ignore_errors: true

    - name: Clean CNI leftovers (all nodes)
      shell: |
        rm -rf /etc/cni/net.d/* /var/lib/cni/* /var/lib/kubelet/pki/* || true

    - name: Restart containerd and kubelet after reset (all nodes)
      shell: |
        systemctl restart containerd
        systemctl restart kubelet

    - name: Render kubeadm config (control-plane only)
      template:
        src: templates/kubeadm-config.yaml.j2
        dest: /tmp/kubeadm-config.yaml
        mode: "0644"
      when: "'central_manager' in group_names"
      run_once: true
      delegate_to: central_manager

    - name: Pre-pull images for kubeadm (control-plane only)
      command: /usr/bin/kubeadm config images pull --config /tmp/kubeadm-config.yaml
      when: "'central_manager' in group_names"
      run_once: true
      delegate_to: central_manager
      register: prepull_result
      retries: 3
      delay: 60
      until: prepull_result.rc == 0
      async: 3600
      poll: 30

    - name: kubeadm init on control-plane
      command: /usr/bin/kubeadm init --config /tmp/kubeadm-config.yaml --v=5
      register: init_out
      when: "'central_manager' in group_names"
      run_once: true
      delegate_to: central_manager

    - name: Setup kubeconfig for root and manager on control-plane
      shell: |
        mkdir -p /root/.kube
        cp -f /etc/kubernetes/admin.conf /root/.kube/config
        chown -R root:root /root/.kube
        mkdir -p /home/manager/.kube
        cp -f /etc/kubernetes/admin.conf /home/manager/.kube/config
        chown manager:manager /home/manager/.kube/config
        chmod 600 /home/manager/.kube/config
      when: "'central_manager' in group_names"
      delegate_to: central_manager


  handlers:
    - name: Restart kubelet
      systemd:
        name: kubelet
        state: restarted
        daemon_reload: yes
