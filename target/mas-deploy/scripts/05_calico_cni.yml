- name: Configure Calico CNI networking
  hosts: all
  gather_facts: yes
  become: yes
  vars_files:
    - vars.yml
  vars:
    kubeconfig_path: /etc/kubernetes/admin.conf

  tasks:
    - name: Resolve OS family
      set_fact:
        resolved_os_family: "{{ 'redhat' if (ansible_os_family in ['RedHat','CentOS','Rocky','AlmaLinux','Fedora','RedOS'] or (ansible_distribution | default('')) in ['RedOS','Red OS']) else 'debian' }}"

    - name: Detect node IP by routing to API endpoint
      shell: ip -4 route get {{ central_manager_ip }} | awk '{for(i=1;i<=NF;i++) if($i=="src"){print $(i+1); exit}}'
      register: route_ip
      changed_when: false
      failed_when: route_ip.rc != 0 and (route_ip.stdout | trim) == ""

    - name: Compute kubelet node-ip (route -> default fallback)
      set_fact:
        k8s_node_ip: "{{ (route_ip.stdout | trim) | default(ansible_default_ipv4.address, true) }}"


    - name: Wipe CNI state on all nodes (before Calico)
      shell: |
        rm -rf /etc/cni/net.d/* /var/lib/cni/* || true
        systemctl restart kubelet

    - name: Ensure localhost entries in /etc/hosts
      lineinfile:
        path: /etc/hosts
        create: yes
        line: "{{ item }}"
        state: present
      loop:
        - "127.0.0.1 localhost"
        - "::1 localhost ip6-localhost ip6-loopback"


    - name: Ensure node hostname resolves (optional but recommended)
      lineinfile:
        path: /etc/hosts
        line: "{{ k8s_node_ip }} {{ inventory_hostname }}"
        state: present


    - name: Install CNI plugins required by kubelet (Debian/Ubuntu/AstraLinux)
      apt:
        name: kubernetes-cni
        state: present
      when: resolved_os_family == 'debian'

    - name: Install CNI plugins required by kubelet (RHEL/RedOS)
      dnf:
        name: kubernetes-cni
        state: present
      when: resolved_os_family == 'redhat'


    - name: Install Calico CNI (from {{ calico_image_registry }})
      shell: |
        curl -fsSL "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml" \
          | sed 's#docker.io/calico/#{{ calico_image_registry }}/#g' \
          | /usr/bin/kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      when: "'central_manager' in group_names"
      delegate_to: central_manager
      run_once: true

    - name: Ensure vxlan module loads on boot
      lineinfile:
        path: /etc/modules-load.d/k8s.conf
        line: vxlan
        create: yes

    - name: Load vxlan now
      shell: modprobe vxlan || true


    - name: Configure calico-node env (IP autodetect + VXLAN + NAT)
      command: >
        /usr/bin/kubectl -n kube-system set env ds/calico-node
        IP_AUTODETECTION_METHOD=kubernetes-internal-ip
        CALICO_IPV4POOL_CIDR=10.244.0.0/16
        CALICO_IPV4POOL_VXLAN=Always
        CALICO_IPV4POOL_IPIP=Never
        CALICO_IPV6POOL_NAT_OUTGOING=false
        CALICO_IPV4POOL_NAT_OUTGOING=true
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      when: "'central_manager' in group_names"
      delegate_to: central_manager
      run_once: true

    - name: Wait for calico-node rollout
      command: /usr/bin/kubectl -n kube-system rollout status ds/calico-node --timeout=600s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: calico_rollout
      failed_when: false
      when: "'central_manager' in group_names"
      delegate_to: central_manager
      run_once: true

    - name: Get calico-node pod status when rollout failed (diagnostic)
      command: /usr/bin/kubectl -n kube-system get pods -l k8s-app=calico-node -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: calico_pods
      changed_when: false
      when: calico_rollout is defined and calico_rollout.rc != 0
      delegate_to: central_manager
      run_once: true

    - name: Describe calico-node pods when rollout failed (diagnostic)
      command: /usr/bin/kubectl -n kube-system describe pods -l k8s-app=calico-node
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: calico_describe
      changed_when: false
      when: calico_rollout is defined and calico_rollout.rc != 0
      delegate_to: central_manager
      run_once: true

    - name: Fail with diagnostic if calico-node did not become ready
      fail:
        msg: "Calico daemon set did not become ready in 600s. Pods:\n{{ calico_pods.stdout | default('(none)') }}\n\nDescribe:\n{{ calico_describe.stdout | default('(none)') }}\n\nCheck image pull (e.g. docker.io) and node readiness; on control-plane ensure Calico manifest has toleration for node-role.kubernetes.io/control-plane."
      when: calico_rollout is defined and calico_rollout.rc != 0
      run_once: true

